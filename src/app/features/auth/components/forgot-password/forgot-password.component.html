<div class="z-aurora-scene min-h-screen flex items-center justify-center p-6">
  <div class="relative z-10 w-full max-w-md">
    <!-- Wordmark gore -->
    <div class="text-center mb-6">
      <span class="z-wordmark text-3xl text-white">
        <span class="z-wordmark-banka">Banka</span>
        <span class="z-wordmark-num">1</span>
      </span>
    </div>

    <div class="z-card p-8 lg:p-10 z-stagger" style="box-shadow: var(--shadow-xl);">
      <button type="button"
              (click)="goToLogin()"
              class="z-btn-ghost h-8 px-2 -ml-2 mb-5 text-xs">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Nazad na prijavu
      </button>

      <!-- Before submission -->
      <div *ngIf="!isSubmitted">
        <header class="mb-7">
          <div class="w-12 h-12 mb-4 rounded-xl flex items-center justify-center"
               style="background: linear-gradient(135deg, var(--emerald-50) 0%, var(--emerald-100) 100%);">
            <svg class="w-6 h-6 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-foreground mb-1.5" style="letter-spacing: -0.025em;">
            Zaboravljena lozinka
          </h1>
          <p class="text-sm text-muted-foreground">
            Unesite email adresu i poslacemo vam link za resetovanje.
          </p>
        </header>

        <div *ngIf="errorMessage"
             class="flex items-start gap-2.5 p-3.5 mb-5 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"
             role="alert">
          <svg class="w-4 h-4 flex-shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <span>{{ errorMessage }}</span>
        </div>

        <form (ngSubmit)="onSubmit()" novalidate class="space-y-4">
          <div>
            <label for="email" class="z-label">Email adresa</label>
            <input id="email" type="email" name="email" [(ngModel)]="email"
                   placeholder="ime.prezime@banka1.rs" autocomplete="email"
                   class="z-input" />
          </div>

          <button type="submit"
                  [disabled]="isLoading"
                  class="z-btn-primary z-btn-lg z-btn-full mt-2">
            <svg *ngIf="isLoading" class="w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
            </svg>
            {{ isLoading ? 'Saljem...' : 'Posalji link za resetovanje' }}
            <svg *ngIf="!isLoading" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </button>
        </form>
      </div>

      <!-- Success -->
      <div *ngIf="isSubmitted" class="text-center py-2">
        <div class="w-16 h-16 mx-auto mb-5 rounded-2xl flex items-center justify-center"
             style="background: var(--gradient-gold); box-shadow: var(--shadow-gold);">
          <svg class="w-8 h-8 text-emerald-900" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-foreground mb-2"
            style="letter-spacing: -0.02em;">
          Proverite email
        </h2>
        <p class="text-sm text-muted-foreground leading-relaxed mb-6">
          Poslali smo link za resetovanje lozinke na
          <strong class="text-foreground">{{ email }}</strong>.
          Kliknite na link u emailu da postavite novu lozinku.
        </p>

        <div class="z-divider-gold"></div>

        <button type="button"
                (click)="goToLogin()"
                class="z-btn-primary z-btn-full">
          Nazad na prijavu
        </button>
      </div>
    </div>
  </div>
</div>
