<div class="z-overlay" (click)="onOverlayClick($event)">
  <div class="z-modal w-full max-w-xl" (click)="$event.stopPropagation()">
    <div class="z-modal-header">
      <h2 class="text-lg font-semibold">Izmeni zaposlenog</h2>
      <button type="button" class="z-btn-icon" (click)="onCancel()" aria-label="Close modal">
        <span class="text-xl leading-none">&times;</span>
      </button>
    </div>

    <form [formGroup]="editForm" (ngSubmit)="onSave()">
      <div class="z-modal-body space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="z-label">Ime <span class="text-destructive">*</span></label>
            <input type="text" class="z-input" formControlName="ime" placeholder="Ime" />
            <p class="z-error" *ngIf="editForm.get('ime')?.invalid && editForm.get('ime')?.touched">
              Obavezno (min 2 karaktera).
            </p>
          </div>
          <div>
            <label class="z-label">Prezime <span class="text-destructive">*</span></label>
            <input type="text" class="z-input" formControlName="prezime" placeholder="Prezime" />
            <p class="z-error" *ngIf="editForm.get('prezime')?.invalid && editForm.get('prezime')?.touched">
              Obavezno (min 2 karaktera).
            </p>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="z-label">Broj telefona <span class="text-destructive">*</span></label>
            <input type="text" class="z-input" formControlName="brojTelefona" placeholder="+381..." />
            <p class="z-error" *ngIf="editForm.get('brojTelefona')?.invalid && editForm.get('brojTelefona')?.touched">
              Broj telefona je obavezan.
            </p>
          </div>
          <div>
            <label class="z-label">Adresa</label>
            <input type="text" class="z-input" formControlName="adresa" placeholder="Adresa" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="z-label">Pozicija</label>
            <input type="text" class="z-input" formControlName="pozicija" placeholder="Pozicija" />
          </div>
          <div>
            <label class="z-label">Odeljenje</label>
            <input type="text" class="z-input" formControlName="departman" placeholder="Odeljenje" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="z-label">Uloga</label>
            <select class="z-select" formControlName="role">
              <option value="BASIC">Basic</option>
              <option value="AGENT">Agent</option>
              <option value="SUPERVISOR">Supervisor</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>
          <div>
            <label class="z-label">Status</label>
            <select class="z-select" formControlName="aktivan">
              <option [ngValue]="true">Aktivan</option>
              <option [ngValue]="false">Neaktivan</option>
            </select>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <input type="checkbox" id="margin" class="w-4 h-4 cursor-pointer" formControlName="margin" />
          <label for="margin" class="z-label cursor-pointer mb-0">Dozvoli permisije za margine</label>
        </div>
      </div>

      <div class="z-modal-footer">
        <button type="button" class="z-btn z-btn-outline" (click)="onCancel()">Otkaži</button>
        <button type="submit" class="z-btn z-btn-primary" [disabled]="editForm.invalid">Sačuvaj izmene</button>
      </div>
    </form>
  </div>
</div>
