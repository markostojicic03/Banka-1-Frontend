<div>
  <div>
    <h1 class="text-2xl font-bold text-foreground mb-6">PRIMAOCI PLAĆANJA</h1>

    <!-- PR_31 T11: shared StateComponent zameni inline loading markup. -->
    <app-state *ngIf="isLoading" mode="loading" text="Učitavanje šablona..."></app-state>

    <div *ngIf="!isLoading" class="space-y-4">
      <!-- Toolbar -->
      <div class="z-card p-4">
        <div class="flex items-center gap-3">
          <div class="relative flex-1">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" placeholder="Pretraži šablone" [(ngModel)]="searchQuery" (ngModelChange)="onSearch()" class="z-input pl-10" />
          </div>
          <button class="z-btn-primary z-btn-sm" type="button" (click)="openAddForm()">DODAJ +</button>
        </div>
      </div>

      <!-- Add/Edit form -->
      <div class="z-card p-5" *ngIf="formMode">
        <h3 class="text-base font-semibold text-foreground mb-4">
          {{ formMode === 'add' ? 'Dodaj primaoca' : 'Izmeni primaoca' }}
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="z-label">Naziv</label>
            <input class="z-input" type="text" placeholder="Ime primaoca" [(ngModel)]="formName" />
          </div>
          <div>
            <label class="z-label">Broj računa</label>
            <input class="z-input" type="text" placeholder="265000000000000000" [(ngModel)]="formAccountNumber" />
          </div>
        </div>
        <p class="z-error" *ngIf="formError">{{ formError }}</p>
        <div class="flex justify-end gap-3 mt-4">
          <button type="button" class="z-btn-outline z-btn-sm" (click)="closeForm()" [disabled]="formLoading">Poništi</button>
          <button type="button" class="z-btn-primary z-btn-sm" (click)="saveRecipient()" [disabled]="formLoading">
            {{ formLoading ? 'Čuvanje...' : 'POTVRDI' }}
          </button>
        </div>
      </div>

      <!-- PR_31 T11: shared StateComponent zameni inline empty markup. -->
      <app-state *ngIf="filteredRecipients.length === 0 && !formMode"
                 mode="empty" title="Nema primaoca plaćanja"
                 text="Dodajte šablon klikom na 'Dodaj +' iznad."></app-state>

      <!-- Table -->
      <div class="z-card overflow-hidden" *ngIf="filteredRecipients.length > 0">
        <table class="z-table">
          <thead>
            <tr>
              <th>NAZIV</th>
              <th>BROJ RAČUNA</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let recipient of filteredRecipients">
              <td class="font-medium">{{ recipient.name }}</td>
              <td class="text-muted-foreground font-mono text-sm">{{ recipient.accountNumber }}</td>
              <td class="text-right">
                <div class="flex gap-1 justify-end">
                  <button class="z-btn-outline z-btn-sm" type="button" (click)="openEditForm(recipient)">Izmeni</button>
                  <button class="z-btn-destructive z-btn-sm" type="button" (click)="deleteRecipient(recipient)">Obriši</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>

        <div class="px-5 py-3 border-t border-border text-sm text-muted-foreground">
          Prikazuje se 1 do {{ totalCount }} od {{ totalCount }} stavke
        </div>
      </div>
    </div>
  </div>
</div>
