<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-shell" (click)="$event.stopPropagation()" *ngIf="account">
    <div class="bg-decoration">
      <div class="bg-circle bg-circle-1"></div>
      <div class="bg-circle bg-circle-2"></div>
      <div class="bg-circle bg-circle-3"></div>
    </div>

    <div class="modal-card">
      <div class="modal-header">
        <div>
          <h2 class="modal-title">Account details</h2>
          <p class="modal-subtitle">Personal account overview</p>
        </div>
        <button type="button" class="close-button" (click)="closeModal()">&times;</button>
      </div>

      <div class="modal-body">
        <div class="details-grid">
          <div class="detail-row">
            <span class="detail-label">Account name</span>
            <span class="detail-value">{{ account.name }}</span>
          </div>
          <div class="detail-row detail-row-balance">
            <span class="detail-label">Balance</span>
            <span class="detail-value detail-value-strong">
              {{ formatAmount(account.balance) }} {{ account.currency }}
            </span>
          </div>
        </div>
      </div>

      <div class="modal-actions-section">
        <p class="options-label">Options</p>
        <div class="options-list">
          <button type="button" class="option-item" (click)="onChangeAccountName()">
            <span class="option-text">Change account name</span>
            <span class="option-arrow">&gt;</span>
          </button>
          <button type="button" class="option-item" (click)="onNewPayment()">
            <span class="option-text">New payment</span>
            <span class="option-arrow">&gt;</span>
          </button>
          <button type="button" class="option-item option-item-limit" (click)="onChangeLimit()">
            <span class="option-text">Change limit</span>
            <span class="option-arrow">&gt;</span>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<app-rename-account-modal
  *ngIf="showRenameModal && account"
  [account]="account"
  [allAccounts]="allAccounts"
  (closed)="showRenameModal = false"
  (updated)="onNameUpdated($event)"
></app-rename-account-modal>
