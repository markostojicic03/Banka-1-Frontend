<!-- Sidebar -->
<aside class="fixed inset-y-0 left-0 z-50 flex w-[240px] flex-col border-r border-sidebar-border bg-sidebar overflow-hidden">
  <!-- Sidebar particles -->
  <div class="sidebar-particles" aria-hidden="true">
    <span class="sp sp-1"></span>
    <span class="sp sp-2"></span>
    <span class="sp sp-3"></span>
    <span class="sp sp-4"></span>
    <span class="sp sp-5"></span>
    <span class="sp sp-6"></span>
    <span class="sp sp-7"></span>
    <span class="sp sp-8"></span>
  </div>

  <!-- Brand -->
  <a [routerLink]="'/home'" class="relative z-10 flex items-center gap-3 px-5 py-5 border-b border-sidebar-border hover:opacity-90 transition-opacity no-underline">
    <img src="assets/images/logo.png" alt="Banka 1" class="h-9 w-9 rounded-lg object-contain" />
    <span class="text-lg font-bold text-white tracking-tight">Banka 1</span>
  </a>

  <!-- Navigation -->
  <nav class="relative z-10 flex flex-1 flex-col gap-0.5 overflow-y-auto px-3 py-3">
    <a *ngFor="let link of navLinks"
       [routerLink]="link.route"
       routerLinkActive="active-link"
       class="nav-link group flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-white/70 transition-all hover:bg-sidebar-accent hover:text-white no-underline">
      <span class="material-icons text-[18px] opacity-80 group-hover:opacity-100 transition-opacity">{{ link.icon }}</span>
      <span class="flex-1">{{ link.label }}</span>
      <span class="material-icons text-[14px] opacity-0 group-hover:opacity-40 transition-opacity">chevron_right</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="relative z-10 border-t border-sidebar-border px-4 py-3">
    <p class="text-xs text-white/40">© 2026 Banka 1</p>
  </div>
</aside>

<!-- Topbar -->
<header class="fixed top-0 left-[240px] right-0 z-40 flex items-center gap-4 bg-green-900 px-6 py-2.5 overflow-hidden">
  <!-- Header particles -->
  <div class="header-particles" aria-hidden="true">
    <span class="hp hp-1"></span>
    <span class="hp hp-2"></span>
    <span class="hp hp-3"></span>
    <span class="hp hp-4"></span>
    <span class="hp hp-5"></span>
    <span class="hp hp-6"></span>
  </div>

  <div class="relative z-10 flex items-center gap-2 bg-white/10 rounded-lg px-3 py-2 flex-1 max-w-md">
    <span class="material-icons text-white/60 text-lg">search</span>
    <input type="text" placeholder="Transakcije, računi, kartice..."
           class="bg-transparent border-0 outline-none text-white text-sm w-full placeholder:text-white/40" />
  </div>
  <div class="relative z-10 flex items-center gap-2 ml-auto">
    <button class="w-9 h-9 rounded-full bg-white/10 text-white flex items-center justify-center border-0 cursor-pointer hover:bg-white/20 transition-colors" title="Obaveštenja">
      <span class="material-icons text-xl">notifications</span>
    </button>
    <span class="text-sm text-white/80 whitespace-nowrap">{{ userName || 'Dobro došli' }}</span>
    <button class="w-9 h-9 rounded-full bg-white/10 text-white flex items-center justify-center border-0 cursor-pointer hover:bg-white/20 transition-colors" routerLink="/profile" title="Profil">
      <span class="material-icons text-xl">account_circle</span>
    </button>
    <button (click)="logout()"
            class="flex items-center gap-1.5 px-3.5 py-2 rounded-lg border border-white/30 bg-transparent text-white/85 text-sm font-semibold cursor-pointer hover:bg-white/10 hover:text-white transition-all">
      <span class="material-icons text-base">logout</span>
      <span>Odjava</span>
    </button>
  </div>
</header>

<!-- Background decoration circles -->
<div class="fixed top-0 left-[240px] right-0 bottom-0 pointer-events-none overflow-hidden z-0">
  <div class="absolute w-[500px] h-[500px] -top-32 -right-32 rounded-full bg-green-400/[0.045] animate-float-slow"></div>
  <div class="absolute w-[350px] h-[350px] bottom-[-80px] left-[10%] rounded-full bg-green-400/[0.045] animate-float-mid"></div>
  <div class="absolute w-[200px] h-[200px] top-[40%] left-[50%] rounded-full bg-green-400/[0.045] animate-float-fast"></div>
</div>
