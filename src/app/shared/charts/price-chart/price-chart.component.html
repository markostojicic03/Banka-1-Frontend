<apx-chart
  *ngIf="options.chart"
  [series]="apexSeries"
  [chart]="options.chart!"
  [theme]="options.theme!"
  [colors]="options.colors!"
  [grid]="options.grid!"
  [stroke]="options.stroke!"
  [fill]="options.fill!"
  [tooltip]="options.tooltip!"
  [markers]="options.markers!"
  [xaxis]="options.xaxis!"
  [yaxis]="options.yaxis!"
  [dataLabels]="options.dataLabels!"
  [legend]="options.legend!">
</apx-chart>
