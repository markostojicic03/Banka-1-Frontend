server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed bundles (main.<hash>.js, styles.<hash>.css, ...) — drze se godinama u kesu;
  # ime fajla se menja kad sadrzaj promeni pa nikada nema stale verzije.
  location ~* \.(js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html (i SPA fallback) MORA da se ne kesira jer drzi referencu na trenutne
  # hash-ovane bundle-ove. Ranije bez ovoga browser je serve-ovao stari index.html
  # iz kesa pa je ucitavao zastareli bundle hash; user je dobijao zastareli kod
  # cak i posle hard-refresh-a (Ctrl+F5).
  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    add_header Pragma "no-cache";
    add_header Expires "0";
    try_files $uri $uri/ /index.html;
  }
}
